 <!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password - AnviPayz</title>
        <link href="css/style.css" rel="stylesheet">
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet">

        <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
        <script>
        (function () {
            const savedTheme = localStorage.getItem('anvi-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    </head>
    <body>
        <div class="auth-wrapper auth-shell">
            <div class="card auth-card">
                <h1
                    style="color: var(--primary); margin-bottom: 0.5rem;">AnviPayz</h1>
                <p
                    style="color: var(--text-muted); margin-bottom: 2rem;">Password
                    management is no longer required with OTP login.</p>

                <button onclick="window.location.href='index.html'"
                    class="btn-primary">Go to Login</button>
            </div>
        </div>
    </body>
</html>
